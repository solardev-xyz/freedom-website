  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #fff;
      color: #111;
      min-height: 100vh;
      padding: 3rem 2rem;
      line-height: 1.7;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
    }

    .logo {
      position: absolute;
      top: 3rem;
      left: 2rem;
    }

    .logo svg {
      height: 56px;
      width: 56px;
    }

    .logo:hover {
      opacity: 0.7;
    }

    @media (max-width: 1000px) {
      .logo {
        position: static;
        display: block;
        margin-bottom: 2rem;
      }
    }

    h1 {
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      letter-spacing: -0.02em;
    }

    .date {
      font-size: 0.85rem;
      color: #888;
    }

    p {
      font-size: 0.95rem;
      color: #333;
      margin-bottom: 1.5rem;
    }

    h2 {
      font-size: 1.15rem;
      font-weight: 600;
      margin-top: 2.5rem;
      margin-bottom: 1rem;
      color: #111;
    }

    h3 {
      font-size: 1rem;
      font-weight: 600;
      margin-top: 2rem;
      margin-bottom: 0.75rem;
      color: #111;
    }

    hr {
      border: none;
      border-top: 1px solid #eee;
      margin: 2.5rem 0;
    }

    ul {
      margin-bottom: 1.5rem;
      padding-left: 1.25rem;
    }

    li {
      font-size: 0.95rem;
      color: #333;
      margin-bottom: 0.5rem;
    }

    strong {
      font-weight: 600;
      color: #111;
    }

    em {
      font-style: italic;
    }

    img {
      max-width: 100%;
      height: auto;
      border-radius: 4px;
    }

    figure {
      margin: 0 0 2em;
    }

    figcaption {
      width: 80%;
      margin: 0 auto;
      font-size: 0.875rem;
      color: #666;
      text-align: center;
    }

    a {
      color: #555;
      text-decoration: none;
      transition: color 0.15s ease;
    }

    a:hover {
      color: #111;
      text-decoration: underline;
    }
  </style>
</head>
